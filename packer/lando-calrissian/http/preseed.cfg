# Debian preseed for automated netinstall — used by Packer during template build.
# Packer serves this file over HTTP; the boot command points the installer at it.
#
# The user created here must match compose_user in vars.pkrvars.hcl.
# The password here must match compose_user_password in vars.pkrvars.hcl.
# After Packer finishes, the SSH public key is the only way in — you can
# disable password auth in sshd_config via a Packer shell provisioner if you want.

# ---- Locale ------------------------------------------------------------------
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# ---- Network -----------------------------------------------------------------
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string local

# ---- Mirror ------------------------------------------------------------------
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# ---- Clock -------------------------------------------------------------------
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# ---- Disk --------------------------------------------------------------------
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ---- Users -------------------------------------------------------------------
d-i passwd/root-login boolean false
d-i passwd/user-fullname string compose user
d-i passwd/username string your-username
# Change this password — must match compose_user_password in vars.pkrvars.hcl
d-i passwd/user-password password temporary-build-password
d-i passwd/user-password-again password temporary-build-password
d-i passwd/user-default-groups string sudo

# ---- Packages ----------------------------------------------------------------
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server sudo
d-i pkgsel/upgrade select safe-upgrade
popularity-contest popularity-contest/participate boolean false

# ---- Bootloader --------------------------------------------------------------
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# ---- Finish ------------------------------------------------------------------
d-i finish-install/reboot_in_progress note
